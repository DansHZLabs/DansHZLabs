name: GitHub Metrics

on:
  schedule:
    - cron: "0 3 * * *" # Todos los días a las 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/github/metrics.svg

          token: ${{ secrets.GH_TOKEN }}

          user: DansHZLabs

          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Madrid

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes

          plugin_isocalendar: yes

          plugin_habits: yes
          plugin_habits_from: 200

          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30

          plugin_stars: yes

      - name: Commit metrics
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/github/metrics.svg
          git diff --cached --quiet || git commit -m "Update GitHub metrics"
          git push
